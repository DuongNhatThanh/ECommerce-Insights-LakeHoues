x-airflow-common: &airflow-common
  image: local-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY}"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/config:/opt/airflow/config
    - ./airflow/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: always

  redis:
    image: redis:7.2-bookworm
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 10
    restart: always

  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create --username thanhdn --password thanhdn --firstname Thanh --lastname DN --role Admin --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    container_name: airflow-webserver
    ports:
      - "6060:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    container_name: airflow-triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always


  flower:
    <<: *airflow-common
    command: celery flower
    container_name: flower
    ports:
      - "5555:5555"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always


  postgres-hive:
    image: postgres:13
    container_name: hpostgres
    hostname: hpostgres
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - hive-db:/var/lib/postgresql/data
    restart: unless-stopped

  metastore:
    image: apache/hive:4.0.0
    container_name: metastore
    hostname: metastore
    depends_on:
      - postgres-hive
    environment:
      DB_DRIVER: postgres
      SERVICE_NAME: metastore
      SERVICE_OPTS: >-
        -Xmx1G
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hpostgres:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=password
    ports:
      - "9083:9083"
    volumes:
      - warehouse:/opt/hive/data/warehouse
      - ./hiveconf:/opt/hive/conf
      - type: bind
        source: ${POSTGRES_LOCAL_PATH}
        target: /opt/hive/lib/postgres.jar
    restart: always

  hiveserver2:
    image: apache/hive:4.0.0
    container_name: hiveserver2
    hostname: hiveserver2
    entrypoint: ["/bin/bash", "-lc", "rm -f /opt/hive/conf/hiveserver2.pid && exec /entrypoint.sh"]
    depends_on:
      - metastore
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      SERVICE_PRECONDITION: metastore:9083
      HIVE_SERVER2_THRIFT_PORT: 10000
      HIVE_METASTORE_URI: thrift://metastore:9083
      SERVICE_OPTS: >-
        -Xmx1G
        -Dhive.metastore.uris=thrift://metastore:9083
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - ./hiveconf:/opt/hive/conf
      - type: bind
        source: ${POSTGRES_LOCAL_PATH}
        target: /opt/hive/lib/postgres.jar
    restart: always



  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  namenode:
    image: local-hadoop:latest
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"
      - "8088:8088"
      - "9000:9000"
    volumes:
      - hadoop-name:/hadoop/dfs/name
      - hadoop-data:/hadoop/dfs/data
      - ./hdfs:/home/setup:ro
    restart: always

  spark-master:
    image: local-spark:latest
    container_name: spark-master
    hostname: spark-master
    depends_on:
      - namenode
    ports:
      - "7077:7077"
      - "8080:8080"
      - "10004:10001"
    environment:
      SPARK_WORKLOAD: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER: spark://spark-master:7077
      HIVE_CONF_DIR: /opt/hive/conf
      HIVE_METASTORE_URI: thrift://metastore:9083
    volumes:
      - ./spark/apps:/opt/spark-apps
      - ./spark/data:/opt/spark-data
      - ./hiveconf:/opt/hive/conf
      - ./hiveconf/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - ./packages/postgresql.jar:/opt/spark/jars/postgresql.jar:ro
      - ./packages/io.delta_delta-spark_2.12-3.1.0.jar:/opt/spark/jars/io.delta_delta-spark_2.12-3.1.0.jar:ro
      - ./packages/io.delta_delta-storage-3.1.0.jar:/opt/spark/jars/io.delta_delta-storage-3.1.0.jar:ro
      - ./packages/org.antlr_antlr4-runtime-4.9.3.jar:/opt/spark/jars/org.antlr_antlr4-runtime-4.9.3.jar:ro
      - spark-logs:/opt/spark/logs
    restart: always

  spark-worker:
    image: local-spark:latest
    container_name: spark-worker
    hostname: spark-worker
    depends_on:
      - spark-master
      - metastore
    ports:
      - "8081:8081"
    environment:
      SPARK_WORKLOAD: worker
      SPARK_MASTER: spark://spark-master:7077
      HIVE_CONF_DIR: /opt/hive/conf
      HIVE_METASTORE_URI: thrift://metastore:9083
    volumes:
      - spark-logs:/opt/spark/logs
      - ./hiveconf:/opt/hive/conf
      - ./hiveconf/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - ./packages/postgresql.jar:/opt/spark/jars/postgresql.jar:ro
      - ./packages/io.delta_delta-spark_2.12-3.1.0.jar:/opt/spark/jars/io.delta_delta-spark_2.12-3.1.0.jar:ro
      - ./packages/io.delta_delta-storage-3.1.0.jar:/opt/spark/jars/io.delta_delta-storage-3.1.0.jar:ro
      - ./packages/org.antlr_antlr4-runtime-4.9.3.jar:/opt/spark/jars/org.antlr_antlr4-runtime-4.9.3.jar:ro
    restart: always

  logstash:
    image: logstash:7.17.23
    container_name: logstash
    hostname: logstash
    depends_on:
      - elasticsearch
    ports:
      - "9600:9600"
    volumes:
      - ./logstash:/logstash_dir
      - spark-logs:/opt/spark/logs
    command: logstash -f /logstash_dir/logstash.conf
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
    restart: always

  cassandra2:
    image: cassandra:4.1.6
    container_name: cassandra2
    hostname: cassandra2
    ports:
      - "9043:9042"
    environment:
      CASSANDRA_SEEDS: cassandra1,cassandra2
      CASSANDRA_CLUSTER_NAME: MyTestCluster
      CASSANDRA_DC: DC1
      CASSANDRA_RACK: RACK1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_NUM_TOKENS: 128
    depends_on:
      - cassandra1
    restart: always

  filebeat:
    image: elastic/filebeat:7.17.23
    container_name: filebeat
    hostname: filebeat
    user: root
    depends_on:
      - logstash
    volumes:
      - ./mylogs:/usr/share/filebeat/mylogs
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml
      - spark-logs:/opt/spark/logs
    command: ["--strict.perms=false"]
    restart: always

  postgres-ecom:
    image: postgres:13
    container_name: db-ecom
    hostname: postgres_ecom
    ports:
      - "5431:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecom
    volumes:
      - ./postgresDB/backup:/home
    restart: always

  nifi:
    image: apache/nifi:1.27.0
    container_name: nifi
    hostname: nifi
    ports:
      - "8443:8443"
    environment:
      NIFI_WEB_HTTP_HOST: 0.0.0.0
      NIFI_WEB_HTTP_PORT: 8443
    volumes:
      - ./nifi/data:/home/data
      - ./nifi/database_repository:/opt/nifi/nifi-current/database_repository
      - ./nifi/flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - ./nifi/content_repository:/opt/nifi/nifi-current/content_repository
      - ./nifi/provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - ./nifi/state:/opt/nifi/nifi-current/state
      - ./nifi/logs:/opt/nifi/nifi-current/logs
      - ./hiveconf:/opt/hadoop-3.2.1/etc/hadoop:ro
    restart: always

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9094:9094"
    env_file:
      - ./kafka.env
    restart: always

  redpanda:
    image: redpandadata/console:v2.7.1
    container_name: redpanda
    depends_on:
      - kafka
    ports:
      - "1010:8080"
    environment:
      KAFKA_BROKERS: kafka:9092
    restart: always

  elasticsearch:
    image: elasticsearch:7.17.23
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xmx512m -Xms512m"
    ports:
      - "9200:9200"
    restart: always

  kibana:
    image: kibana:7.17.23
    container_name: kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    restart: always

  cassandra1:
    image: cassandra:4.1.6
    container_name: cassandra1
    hostname: cassandra1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: MyTestCluster
      CASSANDRA_DC: DC1
      CASSANDRA_RACK: RACK1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_NUM_TOKENS: 128
      CASSANDRA_SEEDS: cassandra1,cassandra2
    volumes:
      - ./cassandra:/home/setup:ro
    restart: always

  grafana:
    image: grafana/grafana:10.2.3-ubuntu
    container_name: grafana
    ports:
      - "3000:3000"
    restart: always

  jupyter-pyspark:
    image: jupyter/pyspark-notebook:python-3.11
    container_name: jupyter-pyspark
    ports:
      - "9999:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      SPARK_MASTER: spark://spark-master:7077
    volumes:
      - ./notebook:/home/jovyan/work
    depends_on:
      - spark-master
    restart: always

volumes:
  postgres-db-volume:
  hadoop-name:
  hadoop-data:
  spark-logs:
  hive-db:
  warehouse:
  spark_home:
  hadoop_conf:
